name: Build and Release Agent

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all platforms
        run: |
          cd backend/agent
          go mod tidy

          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w" -o ../../dist/dockmon-agent-darwin-arm64  .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w" -o ../../dist/dockmon-agent-darwin-amd64  .
          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w" -o ../../dist/dockmon-agent-linux-amd64   .
          GOOS=linux   GOARCH=arm64  go build -ldflags="-s -w" -o ../../dist/dockmon-agent-linux-arm64   .
          GOOS=windows GOARCH=amd64  go build -ldflags="-s -w" -o ../../dist/dockmon-agent-windows-amd64.exe .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
